name: Release
on:
  push:
    tags:
      - "*"
jobs:
  build-aarch64-apple-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target aarch64-apple-darwin --release
      - uses: actions/upload-artifact@v6
        with:
          name: aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/bbpr2md
  build-x86_64-apple-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target x86_64-apple-darwin --release
      - uses: actions/upload-artifact@v6
        with:
          name: x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/bbpr2md
  build-aarch64-unknown-linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cross compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --target aarch64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@v6
        with:
          name: aarch64-unknown-linux-gnu
          path: target/aarch64-unknown-linux-gnu/release/bbpr2md
  build-x86_64-unknown-linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target x86_64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@v6
        with:
          name: x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/bbpr2md
  build-x86_64-pc-windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target x86_64-pc-windows-msvc --release
      - uses: actions/upload-artifact@v6
        with:
          name: x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/bbpr2md.exe
  archive:
    permissions: write-all
    runs-on: ubuntu-latest
    needs:
      - build-aarch64-apple-darwin
      - build-x86_64-apple-darwin
      - build-aarch64-unknown-linux-gnu
      - build-x86_64-unknown-linux-gnu
      - build-x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/
      - uses: actions/download-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/
      - uses: actions/download-artifact@v4
        with:
          name: aarch64-unknown-linux-gnu
          path: target/aarch64-unknown-linux-gnu/release/
      - uses: actions/download-artifact@v4
        with:
          name: x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/
      - uses: actions/download-artifact@v4
        with:
          name: x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/
      - run: chmod +x target/aarch64-apple-darwin/release/bbpr2md target/x86_64-apple-darwin/release/bbpr2md target/aarch64-unknown-linux-gnu/release/bbpr2md target/x86_64-unknown-linux-gnu/release/bbpr2md
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install toml-cli
      - run: gh release -R goreleaser/nfpm download -p 'nfpm_*_amd64.deb' -O nfpm.deb
        env:
          GH_TOKEN: ${{ github.token }}
      - run: sudo dpkg -i nfpm.deb
      - run: git config --global user.name "BBPR2MD Github Actions Runner"
      - run: git config --global user.email "scottmmjackson@gmail.com"
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BBPR2MD_DEPLOY_KEY }}
      - run: just archive-all do-release-package-ci
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}
